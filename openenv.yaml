version: "1.2.0"
env_id: "india-tax-2026-v1"
description: "High-fidelity simulation of Indian Income Tax filings under the Union Budget 2026 guidelines."

action_space:
  type: "Discrete"
  actions:
    - name: "apply_2026_std_deduction"
      description: "Applies the updated ₹1L deduction for salaried taxpayers."
    - name: "check_87A_eligibility"
      description: "Evaluates rebate eligibility under revised income thresholds."
    - name: "calculate_new_regime_slabs"
      description: "Computes tax based on the default 2026-27 regime."

observation_space:
  type: "Dict"
  parameters:
    gross_income: "INR value"
    is_2026_compliant: "Boolean"
